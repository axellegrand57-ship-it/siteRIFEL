<!DOCTYPE html>
<html>
<head>
    <title>Authentification RIFEL</title>
</head>
<body>
    <p>Connexion en cours...</p>
    <script>
        // 1. Récupère le code envoyé par Discord dans l'URL
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        
        // 2. Renvoie vers ton application via ton lien personnalisé
        if (code) {
            window.location.href = "rifel://callback?code=" + code;
        } else {
            document.body.innerHTML = "Erreur : aucun code reçu.";
        }
    </script>
</body>
</html>
